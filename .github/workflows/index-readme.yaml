name: Update README

on:
  push:
    branches:
      - main
    paths:
      - '-/*.md'
  workflow_dispatch: {}

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild README index
        run: bash .github/scripts/build-readme.sh

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: rebuild README index"
          file_pattern: README.md
          branch: main
